name: Nightly Lagom

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # CI matrix - runs the job in lagom-template.yml with different configurations.
  Lagom:
    if: github.repository == 'quanticsoul4772/ladybird'
    name: ${{ matrix.os_name }}, ${{ matrix.arch }}, ${{ matrix.build_preset }}, ${{ matrix.toolchain }}

    strategy:
      fail-fast: false
      matrix:
        os_name: ['Linux']
        arch: ['arm64']
        build_preset: ['Sanitizer']
        toolchain: ['Clang']
        clang_plugins: [false]
        runner_labels: ['["ubuntu-24.04"]']

        include:
          - os_name: 'Linux'
            arch: 'x86_64'
            build_preset: 'Distribution'
            toolchain: 'GNU'
            clang_plugins: false
            runner_labels: '["ubuntu-24.04"]'

          - os_name: 'Linux'
            arch: 'arm64'
            build_preset: 'Distribution'
            toolchain: 'Clang'
            clang_plugins: false
            runner_labels: '["ubuntu-24.04"]'

          - os_name: 'Windows'
            arch: 'x86_64'
            build_preset: 'Sanitizer'
            toolchain: 'ClangCL'
            clang_plugins: false
            runner_labels: '["windows-latest"]'

    secrets: inherit
    uses: ./.github/workflows/lagom-template.yml
    with:
      toolchain: ${{ matrix.toolchain }}
      os_name: ${{ matrix.os_name }}
      runner_labels: ${{ matrix.runner_labels }}
      arch: ${{ matrix.arch }}
      build_preset: ${{ matrix.build_preset }}
      clang_plugins: ${{ matrix.clang_plugins }}

  flatpak:
    if: github.repository == 'quanticsoul4772/ladybird'
    name: Flatpak ${{ matrix.arch }}

    strategy:
      fail-fast: false
      matrix:
        arch: ['x86_64']
        runner_labels: ['["ubuntu-24.04"]']

        include:
          - arch: 'aarch64'
            runner_labels: '["ubuntu-24.04"]'

    secrets: inherit
    uses: ./.github/workflows/flatpak-template.yml
    with:
      arch: ${{ matrix.arch }}
      runner_labels: ${{ matrix.runner_labels }}
