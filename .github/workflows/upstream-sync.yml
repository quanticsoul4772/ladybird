name: Upstream Sync Check
on:
  schedule:
    - cron: "0 9 * * 1"   # Mondays 9 AM UTC
  workflow_dispatch:

jobs:
  sync-check:
    runs-on: ubuntu-24.04
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/LadybirdBrowser/ladybird.git || true
          git fetch upstream master

      - name: Count divergence
        id: diverge
        run: |
          BEHIND=$(git rev-list HEAD..upstream/master --count)
          AHEAD=$(git rev-list upstream/master..HEAD --count)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          echo "Fork is $BEHIND commits behind, $AHEAD ahead of upstream"

      - name: List hook-overlap files
        id: hooks
        run: |
          OVERLAP=$(git diff HEAD upstream/master --name-only | grep -E "(LibWeb/HTML|LibWeb/WebGL|LibWeb/DOM|LibWeb/Page|AK/Format|LibIPC/Limits)" || echo "none")
          echo "overlap=$OVERLAP" >> $GITHUB_OUTPUT
          echo "Files needing manual review: $OVERLAP"

      - name: Open issue if drift > 100 commits
        if: ${{ steps.diverge.outputs.behind > 100 }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if an open sync issue already exists
          EXISTING=$(gh issue list --label maintenance --state open --search "Upstream drift" --json number -q ".[0].number")
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already open, updating comment"
            gh issue comment "$EXISTING" --body "Still ${{ steps.diverge.outputs.behind }} commits behind as of $(date -u +%Y-%m-%d). Hook-overlap files: ${{ steps.hooks.outputs.overlap }}"
          else
            gh issue create \
              --title "Upstream drift: ${{ steps.diverge.outputs.behind }} commits behind LadybirdBrowser" \
              --body "## Auto-detected upstream drift

**Behind**: ${{ steps.diverge.outputs.behind }} commits
**Ahead**: ${{ steps.diverge.outputs.ahead }} commits (fork-specific work)
**Detected**: $(date -u +%Y-%m-%d)

## Files requiring manual review after merge
These files have fork-specific hooks that may conflict with upstream changes:

```
${{ steps.hooks.outputs.overlap }}
```

## How to sync
```bash
git clone https://github.com/quanticsoul4772/ladybird.git
cd ladybird
git remote add upstream https://github.com/LadybirdBrowser/ladybird.git
git fetch upstream
git merge upstream/master
# Resolve conflicts, paying special attention to hook-overlap files above
git push origin master
```

## Hook files to check after merge
- LibWeb/WebGL/WebGLRenderingContextBase.cpp — fingerprinting hooks in get_supported_extensions/get_extension
- LibWeb/HTML/HTMLCanvasElement.cpp — fingerprinting hook in to_data_url
- LibWeb/Page/Page.cpp — user interaction recording in handle_mousedown
- LibWeb/Page/Page.h — user interaction + fullscreen fields
- LibIPC/Limits.h — fork security constants (namespace collision risk)" \
              --label "maintenance"
          fi
