name: Upstream Sync Check
on:
  schedule:
    - cron: "0 9 * * 1"   # Mondays 9 AM UTC
  workflow_dispatch:

jobs:
  sync-check:
    runs-on: ubuntu-24.04
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/LadybirdBrowser/ladybird.git || true
          git fetch upstream master

      - name: Count divergence
        id: diverge
        run: |
          BEHIND=$(git rev-list HEAD..upstream/master --count)
          AHEAD=$(git rev-list upstream/master..HEAD --count)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          echo "Fork is $BEHIND commits behind, $AHEAD ahead of upstream"

      - name: List hook-overlap files
        id: hooks
        run: |
          OVERLAP=$(git diff HEAD upstream/master --name-only \
            | grep -E "(LibWeb/HTML|LibWeb/WebGL|LibWeb/DOM|LibWeb/Page|AK/Format|LibIPC/Limits)" \
            | tr '\n' ' ' || echo "none")
          echo "overlap=$OVERLAP" >> $GITHUB_OUTPUT
          echo "Files needing manual review: $OVERLAP"

      - name: Open issue if drift > 100 commits
        if: ${{ fromJSON(steps.diverge.outputs.behind) > 100 }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEHIND="${{ steps.diverge.outputs.behind }}"
          AHEAD="${{ steps.diverge.outputs.ahead }}"
          OVERLAP="${{ steps.hooks.outputs.overlap }}"
          DATE=$(date -u +%Y-%m-%d)

          # Write body to file to avoid YAML indentation issues with multiline strings
          cat > /tmp/issue-body.md << EOF
          ## Auto-detected upstream drift

          **Behind**: ${BEHIND} commits
          **Ahead**: ${AHEAD} commits (fork-specific work)
          **Detected**: ${DATE}

          ## Files requiring manual review after merge
          These files have fork-specific hooks that may conflict with upstream changes:

          \`\`\`
          ${OVERLAP}
          \`\`\`

          ## How to sync
          \`\`\`bash
          git clone https://github.com/quanticsoul4772/ladybird.git
          cd ladybird
          git remote add upstream https://github.com/LadybirdBrowser/ladybird.git
          git fetch upstream
          git merge upstream/master
          git push origin master
          \`\`\`

          ## Hook files to check after merge
          - LibWeb/WebGL/WebGLRenderingContextBase.cpp -- fingerprinting hooks
          - LibWeb/HTML/HTMLCanvasElement.cpp -- fingerprinting hook in to_data_url
          - LibWeb/Page/Page.cpp -- user interaction recording
          - LibWeb/Page/Page.h -- user interaction and fullscreen fields
          - LibIPC/Limits.h -- fork security constants
          EOF

          # Check if an open sync issue already exists
          EXISTING=$(gh issue list --label maintenance --state open \
            --search "Upstream drift" --json number -q ".[0].number" 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already open, updating comment"
            gh issue comment "$EXISTING" \
              --body "Still ${BEHIND} commits behind as of ${DATE}. Hook-overlap files: ${OVERLAP}"
          else
            gh issue create \
              --title "Upstream drift: ${BEHIND} commits behind LadybirdBrowser" \
              --body-file /tmp/issue-body.md \
              --label "maintenance"
          fi
