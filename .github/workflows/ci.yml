name: CI

on: [push, pull_request, workflow_dispatch]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # CI matrix - runs the job in lagom-template.yml with different configurations.
  Lagom:
    if: github.repository == 'quanticsoul4772/ladybird'
    name: ${{ matrix.os_name }}, ${{ matrix.arch }}, ${{ matrix.build_preset }}, ${{ matrix.toolchain }}

    strategy:
      fail-fast: false
      matrix:
        # Lean matrix for personal fork: Sanitizer with both compilers
        # Fuzzers, All_Debug, and Windows removed to save CI minutes
        # (Sentinel requires Linux-only dependencies: YARA, iptables, nftables)
        os_name: ['Linux']
        arch: ['x86_64']
        build_preset: ['Sanitizer']
        toolchain: ['GNU']
        clang_plugins: [false]
        runner_labels: ['["ubuntu-24.04"]']

        include:
          - os_name: 'Linux'
            arch: 'x86_64'
            build_preset: 'Sanitizer'
            toolchain: 'Clang'
            clang_plugins: true
            runner_labels: '["ubuntu-24.04"]'

    secrets: inherit
    uses: ./.github/workflows/lagom-template.yml
    with:
      toolchain: ${{ matrix.toolchain }}
      os_name: ${{ matrix.os_name }}
      runner_labels: ${{ matrix.runner_labels }}
      arch: ${{ matrix.arch }}
      build_preset: ${{ matrix.build_preset }}
      clang_plugins: ${{ matrix.clang_plugins }}
